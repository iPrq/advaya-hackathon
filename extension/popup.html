<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #f9fafb;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #111827;
      margin-bottom: 12px;
    }
    label {
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
      display: block;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #summarizeBtn {
      background-color: #3b82f6;
      color: white;
    }
    #summarizeBtn:hover {
      background-color: #2563eb;
    }
    #summarizeBtn:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }
    #fillFormBtn {
      background-color: #10b981;
      color: white;
    }
    #fillFormBtn:hover {
      background-color: #059669;
    }
    #status {
      font-size: 12px;
      margin-top: 8px;
      color: #059669;
      font-weight: 600;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>Webpage Analyzer</h2>
  
  <label for="userId">User ID</label>
  <input type="text" id="userId" value="user123" />
  
  <button id="summarizeBtn">Summarize Page Context</button>
  <button id="fillFormBtn">Auto-fill Forms</button>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
